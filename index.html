<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment-timezone/0.6.0/moment-timezone-with-data-1970-2030.js"></script>
    <link rel="stylesheet" href="src/style.css">
    <title>WorldClock</title>
</head>
<body>
    <div class="container">
       <header><h1>World Clock</h1></header>
    <main>
        <select name="city" id="selectCity">
            <option value="">Select a city..</option>
        <option value="current">My current location</option>
        <option value="Europe/London">London</option>
        <option value="America/New_York">New York</option>
        <option value="Pacific/Auckland">Auckland</option>
        </select>
        <div id="cities">
             <div class="city" id="lossAngeles">
            <div class="box">
                <div class="cityName">lossAngels</div>
                <div class="date">August 8, 2026</div>
            </div>
            <div class="time">01:33 <small>PM</small></div>
        </div>
        <div class="city" id="paris">
            <div class="box" >
                <div class="cityName">Paris</div>
                <div class="date">August 8, 2026</div>
            </div>
            <div class="time">01:33 <small>PM</small></div>
        </div>
        <div class="city" id="india">
            <div class="box">
                <div class="cityName">India</div>
                <div class="date">August 8, 2026</div>
            </div>
            <div class="time">01:33 <small>PM</small></div>
        </div>
        </div>
       
    </main> 
    </div>
    
    <footer>This developed with the ❤️ by <strong>Shaik Asiya</strong> ,is it <a href="http://" target="_blank">open source on GitHub</a></footer>
    <script src="src/script.js"></script>
</body>
</html>
